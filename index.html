    ab_who:"हम कौन हैं",ab_whoh:"अभ्युदय समर्पण के बारे में",
    ab_whop1:"अभ्युदय समर्पण एक युवा-संचालित सामाजिक कल्याण पहल है जो निरंतर सामुदायिक कार्यों के माध्यम से सकारात्मक बदलाव के लिए समर्पित है। 14 नवंबर 2024 को स्थापित, यह उन उत्साही लोगों की एक छोटी टीम से शुरू हुआ जो मानते थे कि छोटे लेकिन निरंतर प्रयासों से सार्थक बदलाव आता है।",
    ab_whop2:"एक विनम्र पहल के रूप में शुरू होकर यह 30+ सक्रिय स्वयंसेवकों के समर्पित नेटवर्क में बदल गया है जो विभिन्न सामाजिक क्षेत्रों में काम करते हैं — केवल जागरूकता नहीं, बल्कि वास्तविक व्यावहारिक कार्रवाई करते हैं।",
    ab_vis:"हमारी दृष्टि",ab_vish:"एक सामाजिक रूप से जिम्मेदार समुदाय जहाँ व्यक्ति सक्रिय रूप से बदलाव में योगदान करते हैं।",
    ab_visp:"अभ्युदय का मानना है कि जब लोग साझा उद्देश्य के साथ एक साथ आते हैं — तो छोटे प्रयास भी समाज और पर्यावरण में महत्वपूर्ण और दीर्घकालिक परिवर्तन ला सकते हैं।",
    ab_focus:"फ़ोकस क्षेत्र",ab_f1:"🌿 पर्यावरण",ab_f2:"🐾 पशु कल्याण",ab_f3:"📚 शिक्षा",ab_f4:"🧹 स्वच्छता",
    ab_ow:"हमारा कार्य",ab_4s:"कार्य के 4 क्षेत्र",ab_4ss:"प्रत्येक क्षेत्र समुदाय की एक विशेष सामाजिक आवश्यकता पर केंद्रित है।",
    s1t:"रोपण क्षेत्र",s1s:"हरित आवरण बढ़ाना · सामुदायिक रोपण · स्थायित्व",
    s1p:"पर्यावरण संरक्षण अभ्युदय समर्पण की मुख्य प्राथमिकता है। रोपण क्षेत्र हरित आवरण बढ़ाने और लोगों को वृक्षारोपण में भाग लेने के लिए प्रोत्साहित करने की दिशा में काम करता है।",
    s1c1t:"#Twosaplingsweek",s1c1d:"हर हफ्ते कम से कम दो पौधे लगाए — रोपण को एक नियमित आदत बनाकर। अब तक 20+ पौधे लगाए, 30+ वितरित।",
    s1c2t:"अभ्युदय नर्सरी",s1c2d:"हमारी नर्सरी में पौधे एकत्र और पोषित किए जाते हैं ताकि वे रोपण अभियानों के लिए हमेशा तैयार रहें।",
    s1c3t:"TheGreenAwakeningFestival",s1c3d:"बड़े पैमाने पर रोपण और पौधे वितरण के साथ वार्षिक आयोजन — हमारी पहुँच और समुदाय की भागीदारी बढ़ाता है।",
    s2t:"पशु कल्याण क्षेत्र",s2s:"आवारा पशु आश्रय · बचाव · चिकित्सा उपचार",
    s2p:"आश्रय और चिकित्सा देखभाल के अभाव में पीड़ित आवारा पशुओं की रक्षा और सहायता पर केंद्रित। अभ्युदय समुदाय में पशुओं के प्रति करुणा और जिम्मेदारी को बढ़ावा देता है।",
    s2c1t:"मुफ़्त कुत्तों के घर",s2c1d:"आवारा कुत्तों को सर्दी और बारिश से बचाने के लिए आश्रय स्थापित।",
    s2c2t:"2 कुत्तों का बचाव",s2c2d:"आपातकालीन देखभाल की ज़रूरत वाले दो आवारा कुत्तों को सफलतापूर्वक बचाया और उपचार किया।",
    s2c3t:"1 बिल्ली का बचाव",s2c3d:"एक बिल्ली को बचाया गया और पूर्ण चिकित्सा उपचार प्रदान किया गया।",
    s2c4t:"पिल्लों का उपचार",s2c4d:"संक्रमित पिल्लों का उपचार — उनके ठीक होने और कल्याण को सुनिश्चित करना।",
    s3t:"शिक्षा क्षेत्र",s3s:"निःशुल्क शिक्षण सहायता · रचनात्मक गतिविधियाँ · सामाजिक समावेश",
    s3p:"छात्रों का समर्थन करने और युवा शिक्षार्थियों में रचनात्मकता प्रोत्साहित करने पर केंद्रित — विशेषकर सरकारी और वंचित स्कूलों के बच्चों के लिए।",
    s3c1t:"निःशुल्क शिक्षण सहायता",s3c1d:"स्वयंसेवक छात्रों की पढ़ाई में मदद करते हैं और बिना किसी शुल्क के शैक्षणिक सहायता प्रदान करते हैं।",

    s4t:"स्वच्छ भारत अभियान क्षेत्र",s4s:"स्वच्छता अभियान · अपशिष्ट प्रबंधन · स्थायित्व",
    s4p:"समुदाय में स्वच्छता और जिम्मेदार अपशिष्ट प्रबंधन को बढ़ावा — जमीनी अभियानों, जागरूकता कार्यक्रमों और नवीन पुनर्चक्रण पहलों के माध्यम से।",
    s4c1t:"स्वच्छता अभियान",s4c1d:"सार्वजनिक स्थानों की सफाई और प्लास्टिक कचरा हटाना — स्वच्छ पर्यावरण बनाए रखने की जागरूकता फैलाना।",

    s4c3t:"कचरे से उत्कृष्टता",s4c3d:"बेकार सामग्री को रचनात्मक रूप से उपयोगी उत्पादों में बदला — ड्रिप सिंचाई, पौधे कवर और वर्षा जल संचयन के लिए उपयोग।",

  * { margin:0; padding:0; box-sizing:border-box; }

  body { font-family:'DM Sans',sans-serif; background:var(--cream); color:var(--text); }
  /* ── Hero Slideshow ── */
  .hs-wrap { position:absolute; inset:0; overflow:hidden; z-index:0; }
  .hs-slide {
    position:absolute; inset:0;
    background-size:cover; background-position:center;
    opacity:0;
    transition:opacity 2s ease;
  }
  .hs-slide.hs-active { opacity:1; }
  /* overlay 1 – solid dark */
  .hs-dark { position:absolute; inset:0; background:rgba(6,16,6,.52); z-index:1; }
  /* overlay 2 – radial vignette */
  .hs-vignette {
    position:absolute; inset:0; z-index:2;
    background:radial-gradient(ellipse at 50% 45%, transparent 30%, rgba(0,0,0,.72) 100%);
  }
  /* overlay 3 – bottom fade into page bg */
  .hs-fade-bottom {
    position:absolute; bottom:0; left:0; right:0; height:160px; z-index:3;
    background:linear-gradient(to bottom, transparent, var(--forest));
  }
  /* caption */
  .hs-caption {
    position:absolute; bottom:52px; left:28px; z-index:10;
    display:flex; align-items:center; gap:10px;
    opacity:0; transition:opacity .6s ease;
    pointer-events:none;
  }
  .hs-caption.hs-cap-show { opacity:1; }
  .hs-caption-line { width:24px; height:1.5px; background:rgba(255,255,255,.5); flex-shrink:0; }
  .hs-caption-text { font-size:12px; color:rgba(255,255,255,.5); letter-spacing:.3px; max-width:340px; }
  /* indicators */
  .hs-indicators {
    position:absolute; bottom:52px; right:24px; z-index:10;
    display:flex; align-items:flex-end; gap:5px;
    pointer-events:all;
  }
  .hs-bar {
    width:2px; border-radius:2px; cursor:pointer;
    background:rgba(255,255,255,.2); height:16px;
    transition:height .3s ease, background .3s ease;
  }
  .hs-bar.hs-bar-active { background:#5DCAA5; height:28px; }

    12%  { opacity:var(--to); }

                <div style={{color:"rgba(255,255,255,.5)",fontSize:".72rem",marginTop:".3rem"}}>{tt('fn_per')}<br/>{tt('fn_wk')}</div>
              </div>
            </div>

            {/* BELIEF / CLOSING CTA */}
            <div style={{background:"var(--mist)",borderRadius:16,padding:"3rem",textAlign:"center",border:"1px solid rgba(82,183,136,.2)"}}>
              <div style={{fontSize:"2.5rem",marginBottom:"1rem"}}>🌱</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"1.6rem",color:"var(--forest)",marginBottom:"1rem",lineHeight:1.4}}>
                "Real change begins with small actions."
              </div>
              <p style={{color:"var(--sub)",fontSize:".92rem",maxWidth:560,margin:"0 auto 2rem",lineHeight:1.8}}>
                Every sapling planted, every animal rescued, every student supported, and every clean space created brings us one step closer to a better future. Join Abhyuday Samarpan — and be part of this change.
              </p>
              <div style={{display:"flex",gap:"1rem",justifyContent:"center",flexWrap:"wrap"}}>
                <button className="btn-p" style={{animation:"none"}} onClick={()=>go("apply")}>{tt('cta_b1')}</button>
                <button className="btn-o" onClick={()=>go("rewards")}>{tt("cta_b2")}</button>
              </div>
            </div>

          </div>
        </>
      )}

      <div style={{background:"var(--forest)",padding:"2.5rem 2rem",marginTop:"3rem"}}>
        <div style={{maxWidth:1100,margin:"0 auto",display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:"1.5rem"}}>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",color:"var(--sage)",fontSize:"1.2rem",marginBottom:".4rem"}}><span className="logo-circle" style={{width:"28px",height:"28px",verticalAlign:"middle",marginRight:"4px"}}><img src={LOGO_SRC} style={{width:"100%",height:"100%",objectFit:"cover"}} /></span>HaritSetu</div>
            <div style={{color:"rgba(255,255,255,.45)",fontSize:".78rem",lineHeight:1.7}}>Abhyuday Samarpan<br/>Plantation Sector · #twosaplingsweek</div>
          </div>
          <div>
            <div style={{color:"rgba(255,255,255,.5)",fontSize:".75rem",marginBottom:".6rem",textTransform:"uppercase",letterSpacing:"1px"}}>{tt("ft_prog")}</div>
            {["#twosaplingsweek","TheGreenAwakeningFestival","Abhyuday Nursery","Abhyuday Samarpan"].map(l=>(
              <div key={l} style={{color:"rgba(255,255,255,.5)",fontSize:".82rem",marginBottom:".3rem"}}>{l}</div>
            ))}
          </div>
          <div>
            <div style={{color:"rgba(255,255,255,.5)",fontSize:".75rem",marginBottom:".6rem",textTransform:"uppercase",letterSpacing:"1px"}}>{tt("ft_prob")}</div>
            <div style={{color:"rgba(255,255,255,.45)",fontSize:".8rem",lineHeight:1.7,maxWidth:250}}>
              Land availability · Free sapling access · Community awareness — Abhyuday Samarpan ka HaritSetu.
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
