const MOCK_REQUESTS = [
  { uid: "HS-2024-0047", name: "Ramesh Sharma", village: "Amlaha", saplings: 2, location: "Near Govt School", status: "pending", date: "28 Feb 2026" },
  { uid: "HS-2024-0043", name: "Sunita Patel", village: "Berkheda", saplings: 3, location: "Home Backyard", status: "approved", date: "27 Feb 2026" },
  { uid: "HS-2024-0038", name: "Vikram Singh", village: "Shyampur", saplings: 2, location: "Road Side", status: "collected", date: "25 Feb 2026" },
  { uid: "HS-2024-0031", name: "Meena Devi", village: "Amlaha", saplings: 4, location: "Community Park", status: "complete", date: "20 Feb 2026" },
  { uid: "HS-2024-0024", name: "Ajay Kumar", village: "Tindoli", saplings: 2, location: "Farmland Border", status: "complete", date: "15 Feb 2026" },
];

const STATUS_COLORS = { pending: "status-pending", approved: "status-approved", collected: "status-collected", complete: "status-complete" };
const STATUS_LABELS = { pending: "⏳ Verification Pending", approved: "✅ Approved", collected: "🌱 Sapling Collected", complete: "🌳 Plantation Complete" };
const STATUS_PROGRESS = { pending: 25, approved: 50, collected: 75, complete: 100 };

function generateUID() {
  return "HS-2026-" + String(Math.floor(1000 + Math.random() * 9000));
}

function HaritSetu() {
  const [tab, setTab] = useState("home");
  const [form, setForm] = useState({ name: "", mobile: "", aadhaar: "", village: "", ward: "", location: "", saplings: "2", landType: "", photoUploaded: false });
  const [submitted, setSubmitted] = useState(false);
  const [uid, setUid] = useState("");
  const [trackId, setTrackId] = useState("");
  const [trackedRequest, setTrackedRequest] = useState(null);
  const [proofUploaded, setProofUploaded] = useState(false);
  const [dashTab, setDashTab] = useState("requests");

  const handleSubmit = () => {
    if (!form.name || !form.mobile || !form.village || !form.location) {
      alert("Kripya sabhi zaroori fields bharein.");
      return;
    }
    const newUid = generateUID();
    setUid(newUid);
    setSubmitted(true);
  };

  const handleTrack = () => {
    const found = MOCK_REQUESTS.find(r => r.uid === trackId.toUpperCase()) || 
      (trackId.toUpperCase().startsWith("HS") ? { uid: trackId.toUpperCase(), name: form.name || "Aapka", village: form.village || "Aapka gaon", saplings: form.saplings, location: form.location || "Submitted Location", status: "pending", date: new Date().toLocaleDateString('en-IN') } : null);
    setTrackedRequest(found || { uid: "HS-2026-DEMO", name: "Ramesh Sharma", village: "Amlaha", saplings: 2, location: "Near Govt School", status: "approved", date: "28 Feb 2026" });
  };

  return (
    <div className="app">
      <style>{styles}</style>

      {/* NOTIFICATION BANNER */}
      <div className="notif-banner">
